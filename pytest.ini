[pytest]
# Pytest Configuration for Business Data Analyzer
# ================================================

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore diagnostic scripts that aren't pytest tests
norecursedirs = tests/archive tests/fixtures
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --ignore=tests/test_metabase_connection.py

# Test paths
testpaths = tests

# Python path (for imports)
pythonpath = src

# Async tests (pytest-asyncio)
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests requiring database
    slow: Slow running tests
    requires_db: Tests that require database connection
    requires_api: Tests that require API keys
    asyncio: asyncio-based tests (pytest-asyncio)
    module_assistant: Assistant / storefront AI module
    module_crm: CRM module
    module_wms: WMS module
    module_catalog: Catalog / affinity module

# Coverage options (when using --cov)
[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
